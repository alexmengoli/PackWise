<h2 mat-dialog-title>{{ isEditing ? 'Edit item' : 'New item' }}</h2>

<mat-dialog-content>
  <form class="details-form" [formGroup]="form">
    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" autocomplete="off" />
      @if (form.controls.name.hasError('required')) {
        <mat-error>Name is required.</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>

    <section class="details-form__activity" aria-labelledby="item-activity-section-title">
      <h3 id="item-activity-section-title" class="details-form__section-title">Activity</h3>

      <mat-checkbox formControlName="mandatory">Use for every activity</mat-checkbox>

      @if (!form.controls.mandatory.value) {
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
          <mat-label>Activities</mat-label>
          <mat-select formControlName="activityIds" multiple>
            @for (activity of activities(); track activity.id) {
              <mat-option [value]="activity.id">{{ activity.name }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      }
    </section>

    <mat-form-field appearance="outline" subscriptSizing="dynamic">
      <mat-label>Category</mat-label>
      <input matInput formControlName="categoryId" autocomplete="off" />
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-flat-button type="button" (click)="save()">{{ isEditing ? 'Save' : 'Create' }}</button>
</mat-dialog-actions>
