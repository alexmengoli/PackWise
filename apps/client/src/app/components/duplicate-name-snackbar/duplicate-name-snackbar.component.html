<span class="duplicate-name-snackbar__message">
  A {{ entityLabel }} named "{{ name }}" already exists.
</span>

<span class="duplicate-name-snackbar__actions">
  <button mat-button type="button" (click)="overwrite()">Overwrite</button>
  <button mat-button type="button" (click)="openExisting()">Open</button>
  <button mat-button type="button" (click)="close()">Close</button>
</span>
